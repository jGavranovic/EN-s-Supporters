name: Unit Tests and JaCoCo

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/badges/**'

permissions:
  contents: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TicketApp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run unit tests and build JaCoCo report
        run: ./gradlew testDebugUnitTest jacocoTestReport

      - name: Add coverage summary and generate line coverage badge
        id: coverage
        shell: bash
        run: |
          set -euo pipefail
          REPORT_FILE="app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml"
          if [[ ! -f "$REPORT_FILE" ]]; then
            echo "JaCoCo XML report not found at $REPORT_FILE" >&2
            exit 1
          fi

          python - <<'PY'
import xml.etree.ElementTree as ET
import os
from pathlib import Path

report_path = Path("app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml")
root = ET.parse(report_path).getroot()
line_counter = next((c for c in root.findall("counter") if c.get("type") == "LINE"), None)
if line_counter is None:
    raise SystemExit("Could not find LINE counter in JaCoCo report")

missed = int(line_counter.get("missed", "0"))
covered = int(line_counter.get("covered", "0"))
total = covered + missed
percent = 0.0 if total == 0 else covered * 100.0 / total

summary = [
    "## JaCoCo Coverage",
    "",
    f"- **Line coverage:** {percent:.2f}% ({covered}/{total})",
    "- **HTML report artifact:** `jacoco-html-report`",
    "- **Repository badge:** `.github/badges/line-coverage.svg`",
    "",
]

with open(Path(__import__('os').environ["GITHUB_STEP_SUMMARY"]), "a", encoding="utf-8") as fh:
    fh.write("\n".join(summary))

color = "#e05d44"
if percent >= 90:
    color = "#4c1"
elif percent >= 80:
    color = "#97CA00"
elif percent >= 70:
    color = "#a4a61d"
elif percent >= 60:
    color = "#dfb317"
elif percent >= 50:
    color = "#fe7d37"

workspace = Path(os.environ["GITHUB_WORKSPACE"])
badge_dir = workspace / ".github" / "badges"
badge_dir.mkdir(parents=True, exist_ok=True)
badge_file = badge_dir / "line-coverage.svg"

label = "line coverage"
value = f"{percent:.2f}%"

def text_width(text: str) -> int:
    return max(1, len(text)) * 7 + 10

left_width = text_width(label)
right_width = text_width(value)
total_width = left_width + right_width

svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{total_width}" height="20" role="img" aria-label="{label}: {value}">
  <linearGradient id="g" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <mask id="m">
    <rect width="{total_width}" height="20" rx="3" fill="#fff"/>
  </mask>
  <g mask="url(#m)">
    <rect width="{left_width}" height="20" fill="#555"/>
    <rect x="{left_width}" width="{right_width}" height="20" fill="{color}"/>
    <rect width="{total_width}" height="20" fill="url(#g)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
    <text aria-hidden="true" x="{left_width / 2 * 10}" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="{max(1, (left_width - 10) * 10)}">{label}</text>
    <text x="{left_width / 2 * 10}" y="140" transform="scale(.1)" fill="#fff" textLength="{max(1, (left_width - 10) * 10)}">{label}</text>
    <text aria-hidden="true" x="{(left_width + right_width / 2) * 10}" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="{max(1, (right_width - 10) * 10)}">{value}</text>
    <text x="{(left_width + right_width / 2) * 10}" y="140" transform="scale(.1)" fill="#fff" textLength="{max(1, (right_width - 10) * 10)}">{value}</text>
  </g>
</svg>
'''
badge_file.write_text(svg, encoding="utf-8")

with open(Path(os.environ["GITHUB_OUTPUT"]), "a", encoding="utf-8") as out:
    out.write(f"line_coverage={percent:.2f}\n")
PY

      - name: Commit updated line coverage badge
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/badges/line-coverage.svg; then
            echo "Coverage badge unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/line-coverage.svg
          git commit -m "chore(ci): update coverage badge [skip ci]"
          git push

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: TicketApp/app/build/reports/jacoco/jacocoTestReport/
          if-no-files-found: error


