name: Android unit tests and coverage

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TicketApp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run unit tests and generate JaCoCo report
        run: ./gradlew testDebugUnitTest jacocoTestReport

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: TicketApp/app/build/reports/jacoco/jacocoTestReport/html

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: TicketApp/app/build/test-results/testDebugUnitTest

